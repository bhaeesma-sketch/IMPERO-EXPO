# Project-wide Gradle settings.

# Use Java 17 for Android Gradle Plugin (required)
org.gradle.java.home=/usr/local/Cellar/openjdk@17/17.0.18/libexec/openjdk.jdk/Contents/Home

# JVM arguments for the Gradle daemon
org.gradle.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m
org.gradle.daemon=false

# AndroidX
android.useAndroidX=true
android.suppressUnsupportedCompileSdk=35
